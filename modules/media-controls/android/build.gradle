apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

group = 'com.player.music.mediacontrols'
version = '0.1.0'

android {
  namespace "com.player.music.mediacontrols"
  compileSdk 35

  defaultConfig {
    minSdk 24
    targetSdk 35
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:${getKotlinVersion()}"

  def media3Version = "1.8.0"
  implementation "androidx.media3:media3-session:$media3Version"
  implementation "androidx.media3:media3-common:$media3Version"
  implementation "androidx.media3:media3-ui:$media3Version"

  implementation "androidx.core:core-ktx:1.15.0"
  implementation "androidx.appcompat:appcompat:1.7.1"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
}

String getKotlinVersion() {
  def versions = project.getExtensions().getExtraProperties()
  if (versions.has("kotlinVersion")) {
    return versions.get("kotlinVersion")
  }
  return "1.9.24"
}
